<!DOCTYPE html>
<html lang="fr">
<head>

 <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UPE-Tasker</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
<h1>UPE-Tasker</h1>
<p>Gestionnaire de tâches universitaire</p>
</header>
<main>
<!-- Section 1 : Formulaire d'ajout -->
<section id="task-form-section">
<h2>Ajouter une nouvelle tâche</h2>
<form>
<input type="text" placeholder="Titre de la tâche..." required>
<button type="submit">Ajouter</button>
</form>
</section>
<!-- Section 2 : Affichage de la liste -->
<section id="task-list-section">
<h2>Mes Tâches</h2>
<ul id="task-list">
<li>Terminer le TP de développement Web</li>
<li>Designer qui lit le cours</li>
</ul>
</section>
</main>
<footer>
<p>&copy; 2026 - Université Privée de l'Estuaire.</p>
</footer>
 </body>
</html>
